name: A11y Fix

run-name: "a11y-fix-${{ inputs.finding_ids }}"

on:
  workflow_dispatch:
    inputs:
      target_owner:
        description: "Target repository owner"
        required: true
        type: string
      target_repo:
        description: "Target repository name"
        required: true
        type: string
      pull_number:
        description: "PR number"
        required: true
        type: string
      head_sha:
        description: "PR head SHA"
        required: true
        type: string
      base_ref:
        description: "PR base branch"
        required: true
        type: string
      finding_ids:
        description: "Comma-separated finding IDs or 'all'"
        required: true
        type: string
      requested_by:
        description: "User who requested the fix"
        required: true
        type: string
      target_token:
        description: "Installation token for target repository"
        required: true
        type: string
      check_run_id:
        description: "Check run ID to update with fix result"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout runner repository
        uses: actions/checkout@v4
        with:
          path: runner

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: runner/package-lock.json

      - name: Install runner dependencies
        run: npm install
        working-directory: runner

      - name: Restore findings from cache
        id: findings_cache
        uses: actions/cache/restore@v4
        with:
          path: findings/a11y-findings.json
          key: a11y-findings-${{ inputs.head_sha }}
          fail-on-cache-miss: false

      - name: Resolve finding IDs
        id: resolve_ids
        run: |
          node <<'NODE'
          const fs = require('fs')
          const input = process.env.FINDING_IDS_INPUT.trim()

          if (input === 'all') {
            const cachePath = 'findings/a11y-findings.json'
            if (!fs.existsSync(cachePath)) {
              console.error('No cached findings found for this SHA. Run /a11y-audit first.')
              process.exit(1)
            }
            const payload = JSON.parse(fs.readFileSync(cachePath, 'utf8'))
            const findings = Array.isArray(payload.findings) ? payload.findings : []
            if (findings.length === 0) {
              console.error('Cached findings file is empty. Run /a11y-audit first.')
              process.exit(1)
            }
            const ids = findings.map(f => f.id).filter(Boolean).join(',')
            const out = process.env.GITHUB_OUTPUT
            fs.appendFileSync(out, `resolved_ids=${ids}\n`)
            fs.appendFileSync(out, `id_count=${findings.length}\n`)
          } else {
            const ids = input.split(',').map(s => s.trim()).filter(Boolean)
            const out = process.env.GITHUB_OUTPUT
            fs.appendFileSync(out, `resolved_ids=${ids.join(',')}\n`)
            fs.appendFileSync(out, `id_count=${ids.length}\n`)
          }
          NODE
        env:
          FINDING_IDS_INPUT: ${{ inputs.finding_ids }}

      - name: Install Playwright browsers
        run: npx --prefix runner playwright install chromium --with-deps

      - name: Install Puppeteer Chrome
        run: node "$(find runner/node_modules -path '*/puppeteer/install.mjs' -print -quit)"

      - name: Checkout target repository at PR head
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target_owner }}/${{ inputs.target_repo }}
          ref: ${{ inputs.head_sha }}
          token: ${{ inputs.target_token }}
          path: target

      - name: Resolve local runtime config
        id: runtime
        run: |
          node <<'NODE'
          const fs = require('fs')
          const path = require('path')

          const cfgPath = path.join(process.cwd(), 'target', '.a11y-runner.json')
          const defaults = {
            workdir: 'target',
            installCommand: '',
            buildCommand: '',
            startCommand: 'python3 -m http.server 4173 --bind 127.0.0.1',
            healthUrl: 'http://127.0.0.1:4173',
            readyTimeoutMs: 120000,
          }

          let config = { ...defaults }
          if (fs.existsSync(cfgPath)) {
            const parsed = JSON.parse(fs.readFileSync(cfgPath, 'utf8'))
            config = { ...config, ...(parsed && typeof parsed === 'object' ? parsed : {}) }
          }

          const out = process.env.GITHUB_OUTPUT
          fs.appendFileSync(out, `workdir=${String(config.workdir || defaults.workdir)}\n`)
          fs.appendFileSync(out, `install_command=${String(config.installCommand || '')}\n`)
          fs.appendFileSync(out, `build_command=${String(config.buildCommand || '')}\n`)
          fs.appendFileSync(out, `start_command=${String(config.startCommand || defaults.startCommand)}\n`)
          fs.appendFileSync(out, `health_url=${String(config.healthUrl || defaults.healthUrl)}\n`)
          fs.appendFileSync(out, `ready_timeout_ms=${Number(config.readyTimeoutMs || defaults.readyTimeoutMs)}\n`)
          NODE

      - name: Install target dependencies
        if: ${{ steps.runtime.outputs.install_command != '' }}
        run: bash -lc "${{ steps.runtime.outputs.install_command }}"
        working-directory: ${{ steps.runtime.outputs.workdir }}

      - name: Build target project
        if: ${{ steps.runtime.outputs.build_command != '' }}
        run: bash -lc "${{ steps.runtime.outputs.build_command }}"
        working-directory: ${{ steps.runtime.outputs.workdir }}

      - name: Apply finding fixes
        id: apply_fixes
        run: |
          RESOLVED_IDS="${{ steps.resolve_ids.outputs.resolved_ids }}"
          RESULTS_FILE="$RUNNER_TEMP/fix-results.json"
          echo "[]" > "$RESULTS_FILE"

          PATCHED_IDS=""
          PATCHED_COUNT=0
          VERIFY_ROUTES=""
          VERIFY_RULES=""
          ALL_FAILED=true

          IFS=',' read -ra IDS <<< "$RESOLVED_IDS"
          for CURRENT_ID in "${IDS[@]}"; do
            CURRENT_ID="${CURRENT_ID// /}"
            if [ -z "$CURRENT_ID" ]; then continue; fi

            OUTPUT=$(FINDING_ID="$CURRENT_ID" \
              TARGET_DIR="${{ github.workspace }}/target" \
              FINDINGS_PATH="${{ github.workspace }}/findings/a11y-findings.json" \
              ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
              node runner/scripts/apply-finding-fix.mjs 2>&1) || true

            STATUS=$(echo "$OUTPUT" | grep "^status=" | head -1 | cut -d= -f2)
            PATCHED_FILE=$(echo "$OUTPUT" | grep "^patched_file=" | head -1 | cut -d= -f2)
            BRANCH_SLUG=$(echo "$OUTPUT" | grep "^branch_slug=" | head -1 | cut -d= -f2)
            VERIFY_ROUTE=$(echo "$OUTPUT" | grep "^verify_route=" | head -1 | cut -d= -f2)
            VERIFY_RULE=$(echo "$OUTPUT" | grep "^verify_rule=" | head -1 | cut -d= -f2)
            FINDING_TITLE=$(echo "$OUTPUT" | grep "^finding_title=" | head -1 | cut -d= -f2)

            if [ "$STATUS" = "patched" ]; then
              ALL_FAILED=false
              PATCHED_COUNT=$((PATCHED_COUNT + 1))
              PATCHED_IDS="${PATCHED_IDS:+$PATCHED_IDS,}$CURRENT_ID"
              VERIFY_ROUTES="${VERIFY_ROUTES:+$VERIFY_ROUTES,}$VERIFY_ROUTE"
              VERIFY_RULES="${VERIFY_RULES:+$VERIFY_RULES,}$VERIFY_RULE"
            else
              git -C target checkout -- . 2>/dev/null || true
            fi

            ENTRY=$(ENTRY_ID="$CURRENT_ID" ENTRY_STATUS="${STATUS:-failed}" ENTRY_FILE="$PATCHED_FILE" ENTRY_TITLE="$FINDING_TITLE" node -e "process.stdout.write(JSON.stringify({id:process.env.ENTRY_ID,status:process.env.ENTRY_STATUS,patched_file:process.env.ENTRY_FILE,title:process.env.ENTRY_TITLE}))")
            CURRENT_RESULTS=$(cat "$RESULTS_FILE")
            R="$CURRENT_RESULTS" E="$ENTRY" node -e "const r=JSON.parse(process.env.R);r.push(JSON.parse(process.env.E));process.stdout.write(JSON.stringify(r))" > "${RESULTS_FILE}.tmp" && mv "${RESULTS_FILE}.tmp" "$RESULTS_FILE"
          done

          {
            echo "patched_count=$PATCHED_COUNT"
            echo "patched_ids=$PATCHED_IDS"
            echo "verify_routes=$VERIFY_ROUTES"
            echo "verify_rules=$VERIFY_RULES"
            echo "results_file=$RESULTS_FILE"
            echo "all_failed=$ALL_FAILED"
            echo "branch_slug=multi-${{ github.run_id }}"
          } >> "$GITHUB_OUTPUT"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Rebuild target after patch
        if: ${{ steps.apply_fixes.outputs.all_failed != 'true' && steps.runtime.outputs.build_command != '' }}
        run: bash -lc "${{ steps.runtime.outputs.build_command }}"
        working-directory: ${{ steps.runtime.outputs.workdir }}

      - name: Restart local server for verification
        if: ${{ steps.apply_fixes.outputs.all_failed != 'true' }}
        run: |
          nohup bash -lc "${{ steps.runtime.outputs.start_command }}" > "$RUNNER_TEMP/local-server.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/local-server.pid"
        working-directory: ${{ steps.runtime.outputs.workdir }}

      - name: Wait for local server readiness after patch
        if: ${{ steps.apply_fixes.outputs.all_failed != 'true' }}
        run: |
          HEALTH_URL="${{ steps.runtime.outputs.health_url }}"
          TIMEOUT_MS="${{ steps.runtime.outputs.ready_timeout_ms }}"
          START=$(date +%s)
          TIMEOUT_SECONDS=$((TIMEOUT_MS / 1000))

          while true; do
            if curl -fsS "$HEALTH_URL" >/dev/null 2>&1; then
              echo "Server is ready at $HEALTH_URL"
              break
            fi
            NOW=$(date +%s)
            ELAPSED=$((NOW - START))
            if [ "$ELAPSED" -ge "$TIMEOUT_SECONDS" ]; then
              echo "Server did not become ready in ${TIMEOUT_MS}ms"
              exit 1
            fi
            sleep 2
          done

      - name: Clear findings before verification
        if: ${{ steps.apply_fixes.outputs.all_failed != 'true' }}
        run: find runner/node_modules/@diegovelasquezweb/a11y-engine/.audit -name "a11y-findings.json" -delete 2>/dev/null || true

      - name: Verify patched finding
        id: verify_fix
        if: ${{ steps.apply_fixes.outputs.all_failed != 'true' }}
        run: |
          set +e
          npx --prefix runner a11y-audit \
            --base-url "${{ steps.runtime.outputs.health_url }}" \
            --project-dir "target" \
            --routes "${{ steps.apply_fixes.outputs.verify_routes }}" \
            --only-rule "${{ steps.apply_fixes.outputs.verify_rules }}" \
            --max-routes "1" \
            --wait-until "domcontentloaded" \
            --timeout-ms "45000" \
            --engines "axe,cdp,pa11y"
          STATUS=$?
          echo "exit_code=$STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Check verification result
        id: verify_result
        if: ${{ steps.apply_fixes.outputs.all_failed != 'true' }}
        run: |
          node <<'NODE'
          const fs = require('fs')
          const path = require('path')

          const patchedIds = (process.env.PATCHED_IDS || '').split(',').filter(Boolean)
          const resultsFile = process.env.RESULTS_FILE
          const results = JSON.parse(fs.readFileSync(resultsFile, 'utf8'))

          let engineAuditDir = ''
          try {
            const enginePath = fs.realpathSync(path.join(process.cwd(), 'runner', 'node_modules', '@diegovelasquezweb', 'a11y-engine'))
            engineAuditDir = path.join(enginePath, '.audit')
          } catch {}

          const candidates = [
            engineAuditDir ? path.join(engineAuditDir, 'a11y-findings.json') : '',
            path.join(process.cwd(), 'runner', '.audit', 'a11y-findings.json'),
            path.join(process.cwd(), 'target', '.audit', 'a11y-findings.json'),
          ].filter(Boolean)

          const findingsPath = candidates.find((file) => fs.existsSync(file)) || ''
          const scanOk = process.env.VERIFY_EXIT_CODE === '0'
          let verifyFindings = []
          if (findingsPath) {
            const payload = JSON.parse(fs.readFileSync(findingsPath, 'utf8'))
            verifyFindings = Array.isArray(payload.findings) ? payload.findings : []
          }

          let origFindings = []
          try {
            const cached = JSON.parse(fs.readFileSync('findings/a11y-findings.json', 'utf8'))
            origFindings = Array.isArray(cached.findings) ? cached.findings : []
          } catch {}

          let verifiedCount = 0
          const verifiedIds = []
          for (const id of patchedIds) {
            const orig = origFindings.find(f => f.id === id)
            let verified = scanOk
            if (verified && orig && orig.selector) {
              verified = !verifyFindings.some(
                f => f.rule_id === orig.rule_id && f.selector === orig.selector
              )
            }
            const entry = results.find(r => r.id === id)
            if (entry) {
              entry.verified = verified
              if (!verified) entry.status = 'unverified'
            }
            if (verified) {
              verifiedCount++
              verifiedIds.push(id)
            }
          }

          fs.writeFileSync(resultsFile, JSON.stringify(results, null, 2))

          const out = process.env.GITHUB_OUTPUT
          fs.appendFileSync(out, `verified_count=${verifiedCount}\n`)
          fs.appendFileSync(out, `any_verified=${verifiedCount > 0 ? 'true' : 'false'}\n`)
          fs.appendFileSync(out, `verified_ids=${verifiedIds.join(',')}\n`)
          NODE
        env:
          VERIFY_EXIT_CODE: ${{ steps.verify_fix.outputs.exit_code }}
          PATCHED_IDS: ${{ steps.apply_fixes.outputs.patched_ids }}
          RESULTS_FILE: ${{ steps.apply_fixes.outputs.results_file }}

      - name: Create branch and commit
        id: commit_fix
        if: ${{ steps.verify_result.outputs.any_verified == 'true' }}
        run: |
          BRANCH_NAME="a11y-fix/multi-${{ steps.apply_fixes.outputs.branch_slug }}"
          git -C target checkout -b "$BRANCH_NAME"
          git -C target config user.name "a11y-pr-reviewer[bot]"
          git -C target config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C target add -A
          git -C target commit -m "fix(a11y): resolve ${{ steps.apply_fixes.outputs.patched_ids }}"
          git -C target remote set-url origin "https://x-access-token:${{ inputs.target_token }}@github.com/${{ inputs.target_owner }}/${{ inputs.target_repo }}.git"
          git -C target push origin "$BRANCH_NAME"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "verified_ids=${{ steps.verify_result.outputs.verified_ids }}" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        id: open_pr
        if: ${{ steps.commit_fix.outputs.branch_name != '' }}
        uses: actions/github-script@v7
        env:
          RESULTS_FILE: ${{ steps.apply_fixes.outputs.results_file }}
          VERIFIED_IDS: ${{ steps.commit_fix.outputs.verified_ids }}
        with:
          github-token: ${{ inputs.target_token }}
          script: |
            const fs = require('fs')
            const results = JSON.parse(fs.readFileSync(process.env.RESULTS_FILE, 'utf8'))
            const verifiedIds = (process.env.VERIFIED_IDS || '').split(',').filter(Boolean)

            const rows = results.map(r => {
              const icon = r.verified ? '✅' : r.status === 'patched' || r.status === 'unverified' ? '⚠️' : '❌'
              const statusText = r.verified ? 'Fixed & verified'
                : r.status === 'unverified' ? 'Patched but not verified'
                : r.status === 'skipped' ? 'Skipped'
                : 'Failed'
              return `| ${icon} | \`${r.id}\` | ${r.title || '—'} | ${statusText} | ${r.patched_file ? `\`${r.patched_file}\`` : '—'} |`
            }).join('\n')

            const title = verifiedIds.length === 1
              ? `fix(a11y): resolve ${verifiedIds[0]}`
              : `fix(a11y): resolve ${verifiedIds.length} findings`

            const body = [
              "## Automated Accessibility Fix",
              "",
              `**Requested by:** @${{ inputs.requested_by }}`,
              "",
              "| Status | Finding | Title | Outcome | File |",
              "|--------|---------|-------|---------|------|",
              rows,
              "",
              "This PR was generated by `/a11y-fix` applying engine-backed automated fixes.",
            ].join("\n")

            const response = await github.rest.pulls.create({
              owner: "${{ inputs.target_owner }}",
              repo: "${{ inputs.target_repo }}",
              title,
              head: "${{ steps.commit_fix.outputs.branch_name }}",
              base: "${{ inputs.base_ref }}",
              body,
            })
            core.setOutput("pr_url", response.data.html_url)

      - name: Comment result on PR
        uses: actions/github-script@v7
        env:
          RESULTS_FILE: ${{ steps.apply_fixes.outputs.results_file }}
          PR_URL: ${{ steps.open_pr.outputs.pr_url }}
          ANY_VERIFIED: ${{ steps.verify_result.outputs.any_verified }}
          ALL_FAILED: ${{ steps.apply_fixes.outputs.all_failed }}
        with:
          github-token: ${{ inputs.target_token }}
          script: |
            const fs = require('fs')
            const resultsFile = process.env.RESULTS_FILE
            let results = []
            if (resultsFile && fs.existsSync(resultsFile)) {
              results = JSON.parse(fs.readFileSync(resultsFile, 'utf8'))
            }

            const tableHeader = [
              "| Status | Finding | Title | Outcome |",
              "|--------|---------|-------|---------|",
            ]
            const rows = results.map(r => {
              const icon = r.verified ? '✅' : r.status === 'unverified' ? '⚠️' : r.status === 'skipped' ? '⏭️' : '❌'
              const statusText = r.verified ? 'Fixed & verified'
                : r.status === 'unverified' ? 'Patched but not verified'
                : r.status === 'skipped' ? 'Skipped'
                : 'Failed'
              return `| ${icon} | \`${r.id}\` | ${r.title || '—'} | ${statusText} |`
            })

            let body
            if (process.env.ANY_VERIFIED === 'true' && process.env.PR_URL) {
              body = [
                "## A11y Fix Ready",
                "",
                `**PR:** ${process.env.PR_URL}`,
                "",
                ...tableHeader,
                ...rows,
              ].join("\n")
            } else if (process.env.ALL_FAILED === 'true') {
              body = [
                "## A11y Fix Not Applied",
                "",
                "No findings could be automatically fixed.",
                "",
                ...tableHeader,
                ...rows,
              ].join("\n")
            } else {
              body = [
                "## A11y Fix Could Not Be Verified",
                "",
                "Patches were generated but verification did not pass for any finding.",
                "",
                ...tableHeader,
                ...rows,
              ].join("\n")
            }

            await github.rest.issues.createComment({
              owner: "${{ inputs.target_owner }}",
              repo: "${{ inputs.target_repo }}",
              issue_number: Number("${{ inputs.pull_number }}"),
              body,
            })

      - name: Update fix check run
        if: always()
        uses: actions/github-script@v7
        env:
          ANY_VERIFIED: ${{ steps.verify_result.outputs.any_verified }}
          VERIFIED_COUNT: ${{ steps.verify_result.outputs.verified_count }}
          ALL_FAILED: ${{ steps.apply_fixes.outputs.all_failed }}
          PR_URL: ${{ steps.open_pr.outputs.pr_url }}
          PATCHED_IDS: ${{ steps.apply_fixes.outputs.patched_ids }}
          PATCHED_COUNT: ${{ steps.apply_fixes.outputs.patched_count }}
          RESOLVED_IDS: ${{ steps.resolve_ids.outputs.resolved_ids }}
        with:
          github-token: ${{ inputs.target_token }}
          script: |
            let conclusion, title, summary

            if (process.env.ANY_VERIFIED === 'true' && process.env.PR_URL) {
              conclusion = 'success'
              title = `Fix ready (${process.env.VERIFIED_COUNT || '?'} verified)`
              summary = `Automated fix PR opened: ${process.env.PR_URL}`
            } else if (process.env.ALL_FAILED === 'true') {
              conclusion = 'neutral'
              title = 'No automated fix available'
              summary = `Could not generate fixes for: ${process.env.RESOLVED_IDS || process.env.PATCHED_IDS}`
            } else {
              conclusion = 'failure'
              title = 'Fixes could not be verified'
              summary = `${process.env.PATCHED_COUNT || '0'} patches generated but verification did not pass.`
            }

            await github.rest.checks.update({
              owner: "${{ inputs.target_owner }}",
              repo: "${{ inputs.target_repo }}",
              check_run_id: Number("${{ inputs.check_run_id }}"),
              status: 'completed',
              conclusion,
              output: { title, summary },
            })

      - name: Stop local server
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/local-server.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/local-server.pid")" || true
          fi
