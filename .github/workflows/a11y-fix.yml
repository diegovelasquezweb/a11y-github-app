name: A11y Fix

run-name: "a11y-fix-${{ inputs.finding_id }}"

on:
  workflow_dispatch:
    inputs:
      target_owner:
        description: "Target repository owner"
        required: true
        type: string
      target_repo:
        description: "Target repository name"
        required: true
        type: string
      pull_number:
        description: "PR number"
        required: true
        type: string
      head_sha:
        description: "PR head SHA"
        required: true
        type: string
      base_ref:
        description: "PR base branch"
        required: true
        type: string
      finding_id:
        description: "Finding ID to fix"
        required: true
        type: string
      requested_by:
        description: "User who requested the fix"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout runner repository
        uses: actions/checkout@v4
        with:
          path: runner

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: runner/package-lock.json

      - name: Install runner dependencies
        run: npm install
        working-directory: runner

      - name: Apply finding fix
        id: apply_fix
        run: node runner/scripts/apply-finding-fix.mjs

      - name: Comment result on PR
        uses: actions/github-script@v7
        env:
          APPLY_REASON: ${{ steps.apply_fix.outputs.reason }}
        with:
          github-token: ${{ secrets.TARGET_REPO_TOKEN || github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: "${{ inputs.target_owner }}",
              repo: "${{ inputs.target_repo }}",
              issue_number: Number("${{ inputs.pull_number }}"),
              body: [
                "## A11y Fix Not Applied",
                "",
                `Could not automate a fix for \`${{ inputs.finding_id }}\`.`,
                "",
                process.env.APPLY_REASON,
              ].join("\n"),
            });
