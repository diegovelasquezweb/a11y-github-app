name: A11y Fix

run-name: "a11y-fix-${{ inputs.finding_ids }}"

on:
  workflow_dispatch:
    inputs:
      target_owner:
        description: "Target repository owner"
        required: true
        type: string
      target_repo:
        description: "Target repository name"
        required: true
        type: string
      pull_number:
        description: "PR number"
        required: true
        type: string
      head_sha:
        description: "PR head SHA"
        required: true
        type: string
      head_ref:
        description: "PR head branch name"
        required: true
        type: string
      base_ref:
        description: "PR base branch"
        required: true
        type: string
      finding_ids:
        description: "Comma-separated finding IDs or 'all'"
        required: true
        type: string
      requested_by:
        description: "User who requested the fix"
        required: true
        type: string
      target_token:
        description: "Installation token for target repository"
        required: true
        type: string
      check_run_id:
        description: "Check run ID to update with fix result"
        required: true
        type: string
      ai_model:
        description: "Claude model to use for fix generation"
        required: false
        default: "claude-haiku-4-5-20251001"
        type: string
      project_hints:
        description: "Optional hint string to inject into Claude context (e.g. 'use sr-only labels')"
        required: false
        default: ""
        type: string
      callback_url:
        description: "Base URL for Slack progress updates (optional)"
        required: false
        default: ""
        type: string
      callback_token:
        description: "Callback auth token for progress updates (optional)"
        required: false
        default: ""
        type: string
      slack_channel_id:
        description: "Slack channel ID for dual posting (optional)"
        required: false
        default: ""
        type: string
      slack_message_ts:
        description: "Slack message timestamp to update (optional)"
        required: false
        default: ""
        type: string
      slack_thread_ts:
        description: "Slack thread timestamp (optional)"
        required: false
        default: ""
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      FIX_STEPS: '["Checkout","Restore findings","Generate patches","Verify patches","Create PR"]'
    steps:
      - name: Slack progress — Checking out repository
        if: ${{ inputs.slack_channel_id != '' && inputs.callback_url != '' }}
        run: |
          curl -sS -X POST "${PROGRESS_URL%/scan-callback}/slack-progress" \
            -H "Content-Type: application/json" \
            -H "x-callback-token: ${{ inputs.callback_token }}" \
            --data-raw '{"owner":"${{ inputs.target_owner }}","repo":"${{ inputs.target_repo }}","branch":"${{ inputs.head_ref }}","mode":"Fix","current_step":1,"steps":'"$FIX_STEPS"',"slack_channel_id":"${{ inputs.slack_channel_id }}","slack_message_ts":"${{ inputs.slack_message_ts }}"}' || true
        env:
          PROGRESS_URL: ${{ inputs.callback_url }}

      - name: Checkout runner repository
        uses: actions/checkout@v4
        with:
          path: runner

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: runner/package-lock.json

      - name: Install runner dependencies
        run: npm install
        working-directory: runner

      - name: Slack progress — Restoring findings
        if: ${{ inputs.slack_channel_id != '' && inputs.callback_url != '' }}
        run: |
          curl -sS -X POST "${PROGRESS_URL%/scan-callback}/slack-progress" \
            -H "Content-Type: application/json" \
            -H "x-callback-token: ${{ inputs.callback_token }}" \
            --data-raw '{"owner":"${{ inputs.target_owner }}","repo":"${{ inputs.target_repo }}","branch":"${{ inputs.head_ref }}","mode":"Fix","current_step":2,"steps":'"$FIX_STEPS"',"slack_channel_id":"${{ inputs.slack_channel_id }}","slack_message_ts":"${{ inputs.slack_message_ts }}"}' || true
        env:
          PROGRESS_URL: ${{ inputs.callback_url }}

      - name: Restore findings from cache
        id: findings_cache
        uses: actions/cache/restore@v4
        with:
          path: findings/a11y-findings.json
          key: a11y-findings-${{ inputs.head_sha }}
          fail-on-cache-miss: false

      - name: Restore pattern findings from cache
        id: pattern_findings_cache
        uses: actions/cache/restore@v4
        with:
          path: findings/a11y-pattern-findings.json
          key: a11y-pattern-findings-${{ inputs.head_sha }}
          fail-on-cache-miss: false

      - name: Restore remediation guide from cache
        id: remediation_cache
        uses: actions/cache/restore@v4
        with:
          path: findings/a11y-remediation.md
          key: a11y-remediation-${{ inputs.head_sha }}
          fail-on-cache-miss: false

      - name: Resolve finding IDs
        id: resolve_ids
        run: |
          node <<'NODE'
          const fs = require('fs')
          const input = process.env.FINDING_IDS_INPUT.trim()

          if (input === 'all') {
            const domPath = 'findings/a11y-findings.json'
            const patternPath = 'findings/a11y-pattern-findings.json'
            const domFindings = fs.existsSync(domPath)
              ? (JSON.parse(fs.readFileSync(domPath, 'utf8')).findings || [])
              : []
            const patternFindings = fs.existsSync(patternPath)
              ? (JSON.parse(fs.readFileSync(patternPath, 'utf8')).findings || [])
              : []
            const allFindings = [...domFindings, ...patternFindings]
            if (allFindings.length === 0) {
              console.error('No cached findings found for this SHA. Run /a11y-audit first.')
              process.exit(1)
            }
            const ids = allFindings.map(f => f.id).filter(Boolean).join(',')
            const out = process.env.GITHUB_OUTPUT
            fs.appendFileSync(out, `resolved_ids=${ids}\n`)
            fs.appendFileSync(out, `id_count=${allFindings.length}\n`)
          } else {
            const ids = input.split(',').map(s => s.trim()).filter(Boolean)
            const out = process.env.GITHUB_OUTPUT
            fs.appendFileSync(out, `resolved_ids=${ids.join(',')}\n`)
            fs.appendFileSync(out, `id_count=${ids.length}\n`)
          }
          NODE
        env:
          FINDING_IDS_INPUT: ${{ inputs.finding_ids }}

      - name: Install Playwright browsers
        run: npx --prefix runner playwright install chromium --with-deps

      - name: Install Puppeteer Chrome
        run: node "$(find runner/node_modules -path '*/puppeteer/install.mjs' -print -quit)"

      - name: Checkout target repository at PR head
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target_owner }}/${{ inputs.target_repo }}
          ref: ${{ inputs.head_sha }}
          token: ${{ inputs.target_token }}
          path: target

      - name: Resolve local runtime config
        id: runtime
        run: |
          node <<'NODE'
          const fs = require('fs')
          const path = require('path')

          const cfgPath = path.join(process.cwd(), 'target', '.a11y-runner.json')
          const defaults = {
            workdir: 'target',
            installCommand: '',
            buildCommand: '',
            startCommand: 'python3 -m http.server 4173 --bind 127.0.0.1',
            healthUrl: 'http://127.0.0.1:4173',
            readyTimeoutMs: 120000,
          }

          let config = { ...defaults }
          let postBuildDetect = false

          if (fs.existsSync(cfgPath)) {
            const parsed = JSON.parse(fs.readFileSync(cfgPath, 'utf8'))
            config = { ...config, ...(parsed && typeof parsed === 'object' ? parsed : {}) }
          } else {
            const pkgPath = path.join(process.cwd(), 'target', 'package.json')
            if (fs.existsSync(pkgPath)) {
              try {
                const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'))
                const scripts = pkg.scripts || {}
                config.installCommand = 'npm install'
                if (scripts.build) config.buildCommand = 'npm run build'
                postBuildDetect = true
              } catch {}
            }
          }

          const out = process.env.GITHUB_OUTPUT
          fs.appendFileSync(out, `workdir=${String(config.workdir || defaults.workdir)}\n`)
          fs.appendFileSync(out, `install_command=${String(config.installCommand || '')}\n`)
          fs.appendFileSync(out, `build_command=${String(config.buildCommand || '')}\n`)
          fs.appendFileSync(out, `start_command=${String(config.startCommand || defaults.startCommand)}\n`)
          fs.appendFileSync(out, `health_url=${String(config.healthUrl || defaults.healthUrl)}\n`)
          fs.appendFileSync(out, `ready_timeout_ms=${Number(config.readyTimeoutMs || defaults.readyTimeoutMs)}\n`)
          fs.appendFileSync(out, `post_build_detect=${postBuildDetect}\n`)
          NODE

      - name: Install target dependencies
        if: ${{ steps.runtime.outputs.install_command != '' }}
        run: bash -lc "${{ steps.runtime.outputs.install_command }}"
        working-directory: ${{ steps.runtime.outputs.workdir }}

      - name: Build target project
        if: ${{ steps.runtime.outputs.build_command != '' }}
        run: bash -lc "${{ steps.runtime.outputs.build_command }}"
        working-directory: ${{ steps.runtime.outputs.workdir }}

      - name: Auto-detect server config
        id: server_detect
        if: ${{ steps.runtime.outputs.post_build_detect == 'true' }}
        run: |
          node <<'NODE'
          const fs = require('fs')
          const path = require('path')
          const targetDir = path.join(process.cwd(), 'target')
          const checks = [
            { p: path.join(targetDir, 'out', 'index.html'),   cmd: 'npx --yes serve@latest out -l 4173' },
            { p: path.join(targetDir, 'dist', 'index.html'),  cmd: 'npx --yes serve@latest dist -l 4173' },
            { p: path.join(targetDir, 'build', 'index.html'), cmd: 'npx --yes serve@latest build -l 4173' },
            { p: path.join(targetDir, '.next'),                cmd: 'npx next start -p 4173' },
          ]
          let startCmd = 'python3 -m http.server 4173 --bind 127.0.0.1'
          for (const check of checks) {
            if (fs.existsSync(check.p)) { startCmd = check.cmd; break }
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `start_command=${startCmd}\nhealth_url=http://127.0.0.1:4173\n`)
          console.log('Detected server command:', startCmd)
          NODE

      - name: Slack progress — Generating patches
        if: ${{ inputs.slack_channel_id != '' && inputs.callback_url != '' }}
        run: |
          curl -sS -X POST "${PROGRESS_URL%/scan-callback}/slack-progress" \
            -H "Content-Type: application/json" \
            -H "x-callback-token: ${{ inputs.callback_token }}" \
            --data-raw '{"owner":"${{ inputs.target_owner }}","repo":"${{ inputs.target_repo }}","branch":"${{ inputs.head_ref }}","mode":"Fix","current_step":3,"steps":'"$FIX_STEPS"',"slack_channel_id":"${{ inputs.slack_channel_id }}","slack_message_ts":"${{ inputs.slack_message_ts }}"}' || true
        env:
          PROGRESS_URL: ${{ inputs.callback_url }}

      - name: Apply finding fixes
        id: apply_fixes
        run: |
          RESOLVED_IDS="${{ steps.resolve_ids.outputs.resolved_ids }}"
          RESULTS_FILE="$RUNNER_TEMP/fix-results.json"
          echo "[]" > "$RESULTS_FILE"

          PATCHED_IDS=""
          PATCHED_COUNT=0
          VERIFY_ROUTES=""
          VERIFY_RULES=""
          ALL_FAILED=true
          TOTAL_INPUT_TOKENS=0
          TOTAL_OUTPUT_TOKENS=0

          # Split resolved IDs into DOM (A11Y-*) and pattern (PAT-*) lists
          DOM_IDS=""
          PAT_IDS=""
          IFS=',' read -ra IDS <<< "$RESOLVED_IDS"
          for ID in "${IDS[@]}"; do
            ID="${ID// /}"
            if [ -z "$ID" ]; then continue; fi
            if [[ "$ID" == PAT-* ]]; then
              PAT_IDS="${PAT_IDS:+$PAT_IDS,}$ID"
            else
              DOM_IDS="${DOM_IDS:+$DOM_IDS,}$ID"
            fi
          done

          # ── DOM batch ────────────────────────────────────────────────────────────
          if [ -n "$DOM_IDS" ]; then
            DOM_RESULTS_FILE="$RUNNER_TEMP/dom-results.json"
            DOM_CHECKPOINT="$RUNNER_TEMP/dom-batch.patch"
            git -C target diff > "$DOM_CHECKPOINT" 2>/dev/null || true

            FINDING_IDS="$DOM_IDS" \
              TARGET_DIR="${{ github.workspace }}/target" \
              FINDINGS_PATH="${{ github.workspace }}/findings/a11y-findings.json" \
              REMEDIATION_PATH="${{ github.workspace }}/findings/a11y-remediation.md" \
              AI_MODEL="${{ inputs.ai_model }}" \
              PROJECT_HINTS="${{ inputs.project_hints }}" \
              ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
              RESULTS_OUTPUT_PATH="$DOM_RESULTS_FILE" \
              node runner/scripts/apply-finding-fix.mjs 2>&1 || true

            if [ ! -f "$DOM_RESULTS_FILE" ]; then
              echo "[]" > "$DOM_RESULTS_FILE"
            fi

            # Parse DOM results, set shell vars, and decide rollback in one pass
            DOM_BATCH_PATCHED="false"
            DOM_DEBUG_FILE="$RUNNER_TEMP/dom-debug.log"
            > "$DOM_DEBUG_FILE"
            eval "$(F="$DOM_RESULTS_FILE" R="$RESULTS_FILE" D="$DOM_DEBUG_FILE" node -e "
              const fs = require('fs');
              const results = JSON.parse(fs.readFileSync(process.env.F,'utf8'));
              let patchedIds = [], verifyRoutes = [], verifyRules = [], inTok = 0, outTok = 0;
              const entries = [];
              for (const r of results) {
                const status = r.status === 'patched' ? 'patched' : ((r.message||'').toLowerCase().includes('search block not found') ? 'skipped' : r.status||'failed');
                process.stdout.write('echo [' + r.id + '] status=' + status + '\n');
                fs.appendFileSync(process.env.D, '[' + r.id + '] ' + status + ' | ' + (r.message||'').replace(/[\r\n]+/g,' ').slice(0,150) + '\n');
                entries.push({ id: r.id, status, patched_file: r.patchedFile||'', title: r.findingTitle||'', message: r.message||'' });
                if (r.status === 'patched') {
                  patchedIds.push(r.id);
                  if (r.verifyRoute) verifyRoutes.push(r.verifyRoute);
                  if (r.verifyRule) verifyRules.push(r.verifyRule);
                }
                inTok += r.usage?.input_tokens || 0;
                outTok += r.usage?.output_tokens || 0;
              }
              const current = JSON.parse(fs.readFileSync(process.env.R,'utf8'));
              fs.writeFileSync(process.env.R, JSON.stringify([...current,...entries]));
              if (patchedIds.length) {
                const uniqueRoutes = [...new Set(verifyRoutes)];
                const uniqueRules = [...new Set(verifyRules)];
                process.stdout.write('DOM_BATCH_PATCHED=true\n');
                process.stdout.write('PATCHED_IDS=\"\${PATCHED_IDS:+\${PATCHED_IDS},}' + patchedIds.join(',') + '\"\n');
                process.stdout.write('PATCHED_COUNT=\$((PATCHED_COUNT + ' + patchedIds.length + '))\n');
                process.stdout.write('VERIFY_ROUTES=\"\${VERIFY_ROUTES:+\${VERIFY_ROUTES},}' + uniqueRoutes.join(',') + '\"\n');
                process.stdout.write('VERIFY_RULES=\"\${VERIFY_RULES:+\${VERIFY_RULES},}' + uniqueRules.join(',') + '\"\n');
                process.stdout.write('ALL_FAILED=false\n');
              }
              process.stdout.write('TOTAL_INPUT_TOKENS=\$((TOTAL_INPUT_TOKENS + ' + inTok + '))\n');
              process.stdout.write('TOTAL_OUTPUT_TOKENS=\$((TOTAL_OUTPUT_TOKENS + ' + outTok + '))\n');
            " 2>/dev/null || true)"

            cat "$DOM_DEBUG_FILE" 2>/dev/null || true

            if [ "$DOM_BATCH_PATCHED" != "true" ]; then
              git -C target checkout -- . 2>/dev/null || true
              if [ -s "$DOM_CHECKPOINT" ]; then
                git -C target apply "$DOM_CHECKPOINT" 2>/dev/null || true
              fi
            fi

          fi

          # ── PAT-* per-finding loop ────────────────────────────────────────────────
          if [ -n "$PAT_IDS" ]; then
            # Deduplicate PAT findings by file+line+patternId before processing.
            # When two IDs share the same location and rule, only one needs fixing —
            # the second would fail because the file was already modified by the first.
            DEDUP_OUTPUT=$(PAT_IDS="$PAT_IDS" PATTERN_FILE="${{ github.workspace }}/findings/a11y-pattern-findings.json" node -e "
              const fs = require('fs');
              const ids = (process.env.PAT_IDS || '').split(',').filter(Boolean);
              let findings = [];
              try { findings = JSON.parse(fs.readFileSync(process.env.PATTERN_FILE, 'utf8')).findings || []; } catch {}
              const seen = new Set();
              const keep = [];
              const skip = [];
              for (const id of ids) {
                const f = findings.find(f => f.id === id);
                const key = f ? [f.file, f.line, f.pattern_id || f.patternId].join('|') : id;
                if (seen.has(key)) { skip.push(id); } else { seen.add(key); keep.push(id); }
              }
              process.stdout.write('DEDUP_KEEP=' + keep.join(',') + '\n');
              process.stdout.write('DEDUP_SKIP=' + skip.join(',') + '\n');
            " 2>/dev/null || echo "DEDUP_KEEP=$PAT_IDS")
            eval "$DEDUP_OUTPUT"
            PAT_IDS="$DEDUP_KEEP"

            # Mark skipped duplicates as patched (same fix already applied by sibling finding)
            if [ -n "$DEDUP_SKIP" ]; then
              IFS=',' read -ra SKIP_ARR <<< "$DEDUP_SKIP"
              for SKIP_ID in "${SKIP_ARR[@]}"; do
                SKIP_ID="${SKIP_ID// /}"
                [ -z "$SKIP_ID" ] && continue
                SKIP_TITLE=$(PAT_IDS="$SKIP_ID" PATTERN_FILE="${{ github.workspace }}/findings/a11y-pattern-findings.json" node -e "
                  const fs = require('fs');
                  let findings = [];
                  try { findings = JSON.parse(fs.readFileSync(process.env.PATTERN_FILE, 'utf8')).findings || []; } catch {}
                  const f = findings.find(f => f.id === process.env.PAT_IDS);
                  process.stdout.write((f && f.title) || '');
                " 2>/dev/null || true)
                ENTRY=$(ENTRY_ID="$SKIP_ID" ENTRY_STATUS="patched" ENTRY_TITLE="$SKIP_TITLE" ENTRY_MESSAGE="Duplicate of a sibling finding — fix already applied" node -e "process.stdout.write(JSON.stringify({id:process.env.ENTRY_ID,status:process.env.ENTRY_STATUS,patched_file:'',title:process.env.ENTRY_TITLE,message:process.env.ENTRY_MESSAGE}))")
                CURRENT_RESULTS=$(cat "$RESULTS_FILE")
                R="$CURRENT_RESULTS" E="$ENTRY" node -e "const r=JSON.parse(process.env.R);r.push(JSON.parse(process.env.E));process.stdout.write(JSON.stringify(r))" > "${RESULTS_FILE}.tmp" && mv "${RESULTS_FILE}.tmp" "$RESULTS_FILE"
                PATCHED_COUNT=$((PATCHED_COUNT + 1))
                PATCHED_IDS="${PATCHED_IDS:+$PATCHED_IDS,}$SKIP_ID"
                ALL_FAILED=false
              done
            fi

            IFS=',' read -ra PAT_ID_ARR <<< "$PAT_IDS"
            for CURRENT_ID in "${PAT_ID_ARR[@]}"; do
              CURRENT_ID="${CURRENT_ID// /}"
              if [ -z "$CURRENT_ID" ]; then continue; fi

              SCRIPT_OUTPUT_FILE="$RUNNER_TEMP/script-output-${CURRENT_ID}.txt"
              touch "$SCRIPT_OUTPUT_FILE"

              CHECKPOINT_FILE="$RUNNER_TEMP/checkpoint-${CURRENT_ID}.patch"
              git -C target diff > "$CHECKPOINT_FILE" 2>/dev/null || true

              if [ ! -f "${{ github.workspace }}/findings/a11y-pattern-findings.json" ]; then
                echo "status=no-cache" >> "$SCRIPT_OUTPUT_FILE"
              else
                FINDING_ID="$CURRENT_ID" \
                  TARGET_DIR="${{ github.workspace }}/target" \
                  FINDINGS_PATH="${{ github.workspace }}/findings/a11y-findings.json" \
                  PATTERN_FINDINGS_PATH="${{ github.workspace }}/findings/a11y-pattern-findings.json" \
                  REMEDIATION_PATH="${{ github.workspace }}/findings/a11y-remediation.md" \
                  AI_MODEL="${{ inputs.ai_model }}" \
                  PROJECT_HINTS="${{ inputs.project_hints }}" \
                  ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
                  GITHUB_OUTPUT="$SCRIPT_OUTPUT_FILE" \
                  node runner/scripts/apply-finding-fix.mjs 2>&1 || true
              fi

              STATUS=$(grep "^status=" "$SCRIPT_OUTPUT_FILE" | head -1 | cut -d= -f2)
              FINDING_MESSAGE=$(grep "^message=" "$SCRIPT_OUTPUT_FILE" | head -1 | cut -d= -f2-)
              if [ "$STATUS" != "patched" ] && echo "$FINDING_MESSAGE" | grep -qi "search block not found"; then
                STATUS="skipped"
              fi
              PATCHED_FILE=$(grep "^patched_file=" "$SCRIPT_OUTPUT_FILE" | head -1 | cut -d= -f2)
              VERIFY_ROUTE=$(grep "^verify_route=" "$SCRIPT_OUTPUT_FILE" | head -1 | cut -d= -f2)
              VERIFY_RULE=$(grep "^verify_rule=" "$SCRIPT_OUTPUT_FILE" | head -1 | cut -d= -f2)
              FINDING_TITLE=$(grep "^finding_title=" "$SCRIPT_OUTPUT_FILE" | head -1 | cut -d= -f2)
              FINDING_REASON=$(grep "^reason=" "$SCRIPT_OUTPUT_FILE" | head -1 | cut -d= -f2-)
              FINDING_INPUT_TOKENS=$(grep "^input_tokens=" "$SCRIPT_OUTPUT_FILE" | head -1 | cut -d= -f2)
              FINDING_OUTPUT_TOKENS=$(grep "^output_tokens=" "$SCRIPT_OUTPUT_FILE" | head -1 | cut -d= -f2)
              TOTAL_INPUT_TOKENS=$((TOTAL_INPUT_TOKENS + ${FINDING_INPUT_TOKENS:-0}))
              TOTAL_OUTPUT_TOKENS=$((TOTAL_OUTPUT_TOKENS + ${FINDING_OUTPUT_TOKENS:-0}))
              echo "[$CURRENT_ID] status=$STATUS | reason=$FINDING_REASON | message=$FINDING_MESSAGE"

              if [ "$STATUS" = "patched" ]; then
                ALL_FAILED=false
                PATCHED_COUNT=$((PATCHED_COUNT + 1))
                PATCHED_IDS="${PATCHED_IDS:+$PATCHED_IDS,}$CURRENT_ID"
                VERIFY_ROUTES="${VERIFY_ROUTES:+$VERIFY_ROUTES,}$VERIFY_ROUTE"
                VERIFY_RULES="${VERIFY_RULES:+$VERIFY_RULES,}$VERIFY_RULE"
              else
                git -C target checkout -- . 2>/dev/null || true
                if [ -s "$CHECKPOINT_FILE" ]; then
                  git -C target apply "$CHECKPOINT_FILE" 2>/dev/null || true
                fi
              fi

              ENTRY=$(ENTRY_ID="$CURRENT_ID" ENTRY_STATUS="${STATUS:-failed}" ENTRY_FILE="$PATCHED_FILE" ENTRY_TITLE="$FINDING_TITLE" ENTRY_MESSAGE="$FINDING_MESSAGE" node -e "process.stdout.write(JSON.stringify({id:process.env.ENTRY_ID,status:process.env.ENTRY_STATUS,patched_file:process.env.ENTRY_FILE,title:process.env.ENTRY_TITLE,message:process.env.ENTRY_MESSAGE}))")
              CURRENT_RESULTS=$(cat "$RESULTS_FILE")
              R="$CURRENT_RESULTS" E="$ENTRY" node -e "const r=JSON.parse(process.env.R);r.push(JSON.parse(process.env.E));process.stdout.write(JSON.stringify(r))" > "${RESULTS_FILE}.tmp" && mv "${RESULTS_FILE}.tmp" "$RESULTS_FILE"
            done
          fi

          {
            echo "patched_count=$PATCHED_COUNT"
            echo "patched_ids=$PATCHED_IDS"
            echo "verify_routes=$VERIFY_ROUTES"
            echo "verify_rules=$VERIFY_RULES"
            echo "results_file=$RESULTS_FILE"
            echo "all_failed=$ALL_FAILED"
            echo "branch_slug=multi-${{ github.run_id }}"
            echo "total_input_tokens=$TOTAL_INPUT_TOKENS"
            echo "total_output_tokens=$TOTAL_OUTPUT_TOKENS"
          } >> "$GITHUB_OUTPUT"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Rebuild target after patch
        if: ${{ steps.apply_fixes.outputs.all_failed != 'true' && steps.runtime.outputs.build_command != '' }}
        run: bash -lc "${{ steps.runtime.outputs.build_command }}"
        working-directory: ${{ steps.runtime.outputs.workdir }}

      - name: Restart local server for verification
        if: ${{ steps.apply_fixes.outputs.all_failed != 'true' }}
        run: |
          nohup bash -lc "${{ steps.server_detect.outputs.start_command || steps.runtime.outputs.start_command }}" > "$RUNNER_TEMP/local-server.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/local-server.pid"
        working-directory: ${{ steps.runtime.outputs.workdir }}

      - name: Wait for local server readiness after patch
        if: ${{ steps.apply_fixes.outputs.all_failed != 'true' }}
        run: |
          HEALTH_URL="${{ steps.server_detect.outputs.health_url || steps.runtime.outputs.health_url }}"
          TIMEOUT_MS="${{ steps.runtime.outputs.ready_timeout_ms }}"
          START=$(date +%s)
          TIMEOUT_SECONDS=$((TIMEOUT_MS / 1000))

          while true; do
            if curl -fsS "$HEALTH_URL" >/dev/null 2>&1; then
              echo "Server is ready at $HEALTH_URL"
              break
            fi
            NOW=$(date +%s)
            ELAPSED=$((NOW - START))
            if [ "$ELAPSED" -ge "$TIMEOUT_SECONDS" ]; then
              echo "Server did not become ready in ${TIMEOUT_MS}ms"
              exit 1
            fi
            sleep 2
          done

      - name: Clear findings before verification
        if: ${{ steps.apply_fixes.outputs.all_failed != 'true' }}
        run: find runner/node_modules/@diegovelasquezweb/a11y-engine/.audit -name "a11y-findings.json" -delete 2>/dev/null || true

      - name: Slack progress — Verifying patches
        if: ${{ inputs.slack_channel_id != '' && inputs.callback_url != '' }}
        run: |
          curl -sS -X POST "${PROGRESS_URL%/scan-callback}/slack-progress" \
            -H "Content-Type: application/json" \
            -H "x-callback-token: ${{ inputs.callback_token }}" \
            --data-raw '{"owner":"${{ inputs.target_owner }}","repo":"${{ inputs.target_repo }}","branch":"${{ inputs.head_ref }}","mode":"Fix","current_step":4,"steps":'"$FIX_STEPS"',"slack_channel_id":"${{ inputs.slack_channel_id }}","slack_message_ts":"${{ inputs.slack_message_ts }}"}' || true
        env:
          PROGRESS_URL: ${{ inputs.callback_url }}

      - name: Verify patched finding
        id: verify_fix
        if: ${{ steps.apply_fixes.outputs.all_failed != 'true' }}
        run: |
          set +e
          npx --prefix runner a11y-audit \
            --base-url "${{ steps.server_detect.outputs.health_url || steps.runtime.outputs.health_url }}" \
            --project-dir "target" \
            --routes "${{ steps.apply_fixes.outputs.verify_routes }}" \
            --only-rule "${{ steps.apply_fixes.outputs.verify_rules }}" \
            --wait-until "domcontentloaded" \
            --timeout-ms "45000" \
            --engines "axe,cdp,pa11y"
          STATUS=$?
          echo "exit_code=$STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Check verification result
        id: verify_result
        if: ${{ steps.apply_fixes.outputs.all_failed != 'true' }}
        run: |
          node <<'NODE'
          const fs = require('fs')
          const path = require('path')

          const patchedIds = (process.env.PATCHED_IDS || '').split(',').filter(Boolean)
          const resultsFile = process.env.RESULTS_FILE
          const results = JSON.parse(fs.readFileSync(resultsFile, 'utf8'))

          let engineAuditDir = ''
          try {
            const enginePath = fs.realpathSync(path.join(process.cwd(), 'runner', 'node_modules', '@diegovelasquezweb', 'a11y-engine'))
            engineAuditDir = path.join(enginePath, '.audit')
          } catch {}

          const candidates = [
            engineAuditDir ? path.join(engineAuditDir, 'a11y-findings.json') : '',
            path.join(process.cwd(), 'runner', '.audit', 'a11y-findings.json'),
            path.join(process.cwd(), 'target', '.audit', 'a11y-findings.json'),
          ].filter(Boolean)

          const findingsPath = candidates.find((file) => fs.existsSync(file)) || ''
          const scanOk = process.env.VERIFY_EXIT_CODE === '0'
          let verifyFindings = []
          if (findingsPath) {
            const payload = JSON.parse(fs.readFileSync(findingsPath, 'utf8'))
            verifyFindings = Array.isArray(payload.findings) ? payload.findings : []
          }

          let origFindings = []
          try {
            const cached = JSON.parse(fs.readFileSync('findings/a11y-findings.json', 'utf8'))
            origFindings = Array.isArray(cached.findings) ? cached.findings : []
          } catch {}

          let verifiedCount = 0
          const verifiedIds = []

          // First pass: determine verified status per finding
          const verifiedBySelector = new Map() // "selector|route" -> bool
          const findingVerified = new Map()

          for (const id of patchedIds) {
            const orig = origFindings.find(f => f.id === id)
            let verified = scanOk
            if (verified && orig && orig.selector) {
              const origRoute = orig.area || orig.url || ''
              verified = !verifyFindings.some(
                f => f.rule_id === orig.rule_id &&
                     f.selector === orig.selector &&
                     (!origRoute || f.area === origRoute || f.url === origRoute)
              )
              // Track verified state by selector+route so cross-engine duplicates benefit
              const key = `${orig.selector}|${origRoute}`
              if (verified) verifiedBySelector.set(key, true)
              else if (!verifiedBySelector.has(key)) verifiedBySelector.set(key, false)
            }
            findingVerified.set(id, { orig, verified })
          }

          // Second pass: a finding is verified if its own check passed OR another finding
          // with the same selector+route was verified (same element, different engine)
          for (const id of patchedIds) {
            const { orig, verified: ownVerified } = findingVerified.get(id)
            let verified = ownVerified
            if (!verified && orig && orig.selector) {
              const origRoute = orig.area || orig.url || ''
              const key = `${orig.selector}|${origRoute}`
              verified = verifiedBySelector.get(key) === true
            }
            const entry = results.find(r => r.id === id)
            if (entry) {
              entry.verified = verified
              if (!verified) entry.status = 'unverified'
            }
            if (verified) {
              verifiedCount++
              verifiedIds.push(id)
            }
          }

          fs.writeFileSync(resultsFile, JSON.stringify(results, null, 2))

          const out = process.env.GITHUB_OUTPUT
          fs.appendFileSync(out, `verified_count=${verifiedCount}\n`)
          fs.appendFileSync(out, `any_verified=${verifiedCount > 0 ? 'true' : 'false'}\n`)
          fs.appendFileSync(out, `verified_ids=${verifiedIds.join(',')}\n`)
          NODE
        env:
          VERIFY_EXIT_CODE: ${{ steps.verify_fix.outputs.exit_code }}
          PATCHED_IDS: ${{ steps.apply_fixes.outputs.patched_ids }}
          RESULTS_FILE: ${{ steps.apply_fixes.outputs.results_file }}

      - name: Create branch and commit
        id: commit_fix
        if: ${{ steps.verify_result.outputs.any_verified == 'true' }}
        run: |
          BRANCH_NAME="a11y-fix/multi-${{ steps.apply_fixes.outputs.branch_slug }}"
          git -C target checkout -b "$BRANCH_NAME"
          git -C target config user.name "a11y-pr-reviewer[bot]"
          git -C target config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C target add -u
          git -C target commit -m "fix(a11y): resolve ${{ steps.apply_fixes.outputs.patched_ids }}"
          git -C target remote set-url origin "https://x-access-token:${{ inputs.target_token }}@github.com/${{ inputs.target_owner }}/${{ inputs.target_repo }}.git"
          git -C target push origin "$BRANCH_NAME"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "verified_ids=${{ steps.verify_result.outputs.verified_ids }}" >> "$GITHUB_OUTPUT"

      - name: Slack progress — Creating fix PR
        if: ${{ inputs.slack_channel_id != '' && inputs.callback_url != '' && steps.commit_fix.outputs.branch_name != '' }}
        run: |
          curl -sS -X POST "${PROGRESS_URL%/scan-callback}/slack-progress" \
            -H "Content-Type: application/json" \
            -H "x-callback-token: ${{ inputs.callback_token }}" \
            --data-raw '{"owner":"${{ inputs.target_owner }}","repo":"${{ inputs.target_repo }}","branch":"${{ inputs.head_ref }}","mode":"Fix","current_step":5,"steps":'"$FIX_STEPS"',"slack_channel_id":"${{ inputs.slack_channel_id }}","slack_message_ts":"${{ inputs.slack_message_ts }}"}' || true
        env:
          PROGRESS_URL: ${{ inputs.callback_url }}

      - name: Open pull request
        id: open_pr
        if: ${{ steps.commit_fix.outputs.branch_name != '' }}
        uses: actions/github-script@v7
        env:
          RESULTS_FILE: ${{ steps.apply_fixes.outputs.results_file }}
          VERIFIED_IDS: ${{ steps.commit_fix.outputs.verified_ids }}
          TOTAL_INPUT_TOKENS: ${{ steps.apply_fixes.outputs.total_input_tokens }}
          TOTAL_OUTPUT_TOKENS: ${{ steps.apply_fixes.outputs.total_output_tokens }}
          AI_MODEL: ${{ inputs.ai_model }}
        with:
          github-token: ${{ inputs.target_token }}
          script: |
            const fs = require('fs')
            const results = JSON.parse(fs.readFileSync(process.env.RESULTS_FILE, 'utf8'))
            const verifiedIds = (process.env.VERIFIED_IDS || '').split(',').filter(Boolean)
            const escHtml = t => (t || '').replace(/<\/?([a-zA-Z][a-zA-Z0-9]*)[^>]*>/g, (_, tag) => `\`<${tag}>\``)

            const rows = results.map(r => {
              const alreadyResolved = (r.message || '').toLowerCase().includes('already resolved')
              const icon = alreadyResolved ? '✅' : r.verified ? '✅' : r.status === 'patched' || r.status === 'unverified' ? '⚠️' : r.status === 'skipped' ? '⏭️' : '❌'
              const statusText = alreadyResolved ? 'Already resolved'
                : r.verified ? 'Fixed & verified'
                : r.status === 'unverified' ? 'Patched but not verified'
                : r.status === 'skipped' ? 'Skipped'
                : `Could not patch — retry with \`/a11y-fix ${r.id}\``
              return `| ${icon} | \`${r.id}\` | ${escHtml(r.title) || '—'} | ${statusText} | ${r.patched_file ? `\`${r.patched_file}\`` : '—'} |`
            }).join('\n')

            const verifiedTitles = results
              .filter(r => verifiedIds.includes(r.id) && r.title)
              .map(r => r.title)
            const titleSuffix = verifiedTitles.length > 0
              ? verifiedTitles.join(', ')
              : verifiedIds.join(', ')
            const title = `fix(a11y): ${titleSuffix.length > 72 ? titleSuffix.slice(0, 72) + '…' : titleSuffix}`

            const inputTokens = parseInt(process.env.TOTAL_INPUT_TOKENS || '0', 10)
            const outputTokens = parseInt(process.env.TOTAL_OUTPUT_TOKENS || '0', 10)
            const estimatedCost = ((inputTokens * 0.80 + outputTokens * 4.00) / 1_000_000).toFixed(6)
            const usageSection = [
              "",
              "### AI Usage",
              "| Metric | Value |",
              "|--------|-------|",
              `| Model | \`${process.env.AI_MODEL || 'claude-haiku-4-5-20251001'}\` |`,
              `| Input tokens | ${inputTokens.toLocaleString()} |`,
              `| Output tokens | ${outputTokens.toLocaleString()} |`,
              `| Estimated cost | $${estimatedCost} |`,
            ].join("\n")

            const body = [
              "## Automated Accessibility Fix",
              "",
              `**Requested by:** @${{ inputs.requested_by }}`,
              "",
              "| Status | Finding | Title | Outcome | File |",
              "|--------|---------|-------|---------|------|",
              rows,
              "",
              "This PR was generated by `/a11y-fix` applying engine-backed automated fixes.",
              usageSection,
            ].join("\n")

            const response = await github.rest.pulls.create({
              owner: "${{ inputs.target_owner }}",
              repo: "${{ inputs.target_repo }}",
              title,
              head: "${{ steps.commit_fix.outputs.branch_name }}",
              base: "${{ inputs.head_ref }}",
              body,
            })
            core.setOutput("pr_url", response.data.html_url)

      - name: Comment result on PR
        uses: actions/github-script@v7
        env:
          RESULTS_FILE: ${{ steps.apply_fixes.outputs.results_file }}
          PR_URL: ${{ steps.open_pr.outputs.pr_url }}
          ANY_VERIFIED: ${{ steps.verify_result.outputs.any_verified }}
          ALL_FAILED: ${{ steps.apply_fixes.outputs.all_failed }}
          TOTAL_INPUT_TOKENS: ${{ steps.apply_fixes.outputs.total_input_tokens }}
          TOTAL_OUTPUT_TOKENS: ${{ steps.apply_fixes.outputs.total_output_tokens }}
          AI_MODEL: ${{ inputs.ai_model }}
        with:
          github-token: ${{ inputs.target_token }}
          script: |
            const fs = require('fs')
            const resultsFile = process.env.RESULTS_FILE
            let results = []
            if (resultsFile && fs.existsSync(resultsFile)) {
              results = JSON.parse(fs.readFileSync(resultsFile, 'utf8'))
            }
            const escHtml = t => (t || '').replace(/<\/?([a-zA-Z][a-zA-Z0-9]*)[^>]*>/g, (_, tag) => `\`<${tag}>\``)

            const tableHeader = [
              "| Status | Finding | Title | Outcome |",
              "|--------|---------|-------|---------|",
            ]
            const rows = results.map(r => {
              const alreadyResolved = (r.message || '').toLowerCase().includes('already resolved')
              const icon = alreadyResolved ? '✅' : r.verified ? '✅' : r.status === 'unverified' ? '⚠️' : r.status === 'skipped' ? '⏭️' : '❌'
              const statusText = alreadyResolved ? 'Already resolved'
                : r.verified ? 'Fixed & verified'
                : r.status === 'unverified' ? 'Patched but not verified'
                : r.status === 'skipped' ? 'Skipped'
                : `Could not patch — retry with \`/a11y-fix ${r.id}\``
              return `| ${icon} | \`${r.id}\` | ${escHtml(r.title) || '—'} | ${statusText} |`
            })

            const inputTokens = parseInt(process.env.TOTAL_INPUT_TOKENS || '0', 10)
            const outputTokens = parseInt(process.env.TOTAL_OUTPUT_TOKENS || '0', 10)
            const estimatedCost = ((inputTokens * 0.80 + outputTokens * 4.00) / 1_000_000).toFixed(6)
            const usageSection = [
              "",
              "### AI Usage",
              "| Metric | Value |",
              "|--------|-------|",
              `| Model | \`${process.env.AI_MODEL || 'claude-haiku-4-5-20251001'}\` |`,
              `| Input tokens | ${inputTokens.toLocaleString()} |`,
              `| Output tokens | ${outputTokens.toLocaleString()} |`,
              `| Estimated cost | $${estimatedCost} |`,
            ].join("\n")

            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            const agentSection = [
              "",
              "---",
              "",
              `🤖 **Want to review with your agent?** [Download the fix report](${runUrl}) and share it with your AI agent to verify each change.`,
            ].join("\n")

            let body
            if (process.env.ANY_VERIFIED === 'true' && process.env.PR_URL) {
              body = [
                "## A11y Fix Ready",
                "",
                `Review the changes and merge the Pull Request if everything looks correct. If any finding failed, try running \`/a11y-fix <ID>\` again.`,
                "",
                `**Pull Request:** ${process.env.PR_URL}`,
                "",
                ...tableHeader,
                ...rows,
                usageSection,
                agentSection,
              ].join("\n")
            } else if (process.env.ALL_FAILED === 'true') {
              body = [
                "## A11y Fix Not Applied",
                "",
                "No findings could be automatically fixed.",
                "",
                ...tableHeader,
                ...rows,
                usageSection,
              ].join("\n")
            } else {
              body = [
                "## A11y Fix Could Not Be Verified",
                "",
                "Patches were generated but verification did not pass for any finding.",
                "",
                ...tableHeader,
                ...rows,
                usageSection,
              ].join("\n")
            }

            await github.rest.issues.createComment({
              owner: "${{ inputs.target_owner }}",
              repo: "${{ inputs.target_repo }}",
              issue_number: Number("${{ inputs.pull_number }}"),
              body,
            })

      - name: Update fix check run
        if: always()
        uses: actions/github-script@v7
        env:
          ANY_VERIFIED: ${{ steps.verify_result.outputs.any_verified }}
          VERIFIED_COUNT: ${{ steps.verify_result.outputs.verified_count }}
          ALL_FAILED: ${{ steps.apply_fixes.outputs.all_failed }}
          PR_URL: ${{ steps.open_pr.outputs.pr_url }}
          PATCHED_IDS: ${{ steps.apply_fixes.outputs.patched_ids }}
          PATCHED_COUNT: ${{ steps.apply_fixes.outputs.patched_count }}
          RESOLVED_IDS: ${{ steps.resolve_ids.outputs.resolved_ids }}
        with:
          github-token: ${{ inputs.target_token }}
          script: |
            let conclusion, title, summary

            if (process.env.ANY_VERIFIED === 'true' && process.env.PR_URL) {
              conclusion = 'success'
              title = `Fix ready (${process.env.VERIFIED_COUNT || '?'} verified)`
              summary = `Automated fix PR opened: ${process.env.PR_URL}`
            } else if (process.env.ALL_FAILED === 'true') {
              conclusion = 'neutral'
              title = 'No automated fix available'
              summary = `Could not generate fixes for: ${process.env.RESOLVED_IDS || process.env.PATCHED_IDS}`
            } else {
              conclusion = 'failure'
              title = 'Fixes could not be verified'
              summary = `${process.env.PATCHED_COUNT || '0'} patches generated but verification did not pass.`
            }

            await github.rest.checks.update({
              owner: "${{ inputs.target_owner }}",
              repo: "${{ inputs.target_repo }}",
              check_run_id: Number("${{ inputs.check_run_id }}"),
              status: 'completed',
              conclusion,
              output: { title, summary },
            })

      - name: Generate fix report
        if: always()
        run: |
          node <<'NODE'
          const fs = require('fs')
          const path = require('path')

          const resultsFile = process.env.RESULTS_FILE
          const prUrl = process.env.PR_URL || ''
          const runUrl = `https://github.com/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
          const date = new Date().toISOString().slice(0, 10)

          let results = []
          try { results = JSON.parse(fs.readFileSync(resultsFile, 'utf8')) } catch {}
          const escHtml = t => (t || '').replace(/<\/?([a-zA-Z][a-zA-Z0-9]*)[^>]*>/g, (_, tag) => `\`<${tag}>\``)

          // Load original findings to get before/after context
          let origFindings = []
          try {
            const cached = JSON.parse(fs.readFileSync('findings/a11y-findings.json', 'utf8'))
            origFindings = Array.isArray(cached.findings) ? cached.findings : []
          } catch {}

          let patternFindings = []
          try {
            const cached = JSON.parse(fs.readFileSync('findings/a11y-pattern-findings.json', 'utf8'))
            patternFindings = Array.isArray(cached.findings) ? cached.findings : []
          } catch {}

          const allFindings = [...origFindings, ...patternFindings]

          const lines = [
            '# A11y Fix Report',
            '',
            `**Date:** ${date}`,
            `**Run:** [View workflow run](${runUrl})`,
            prUrl ? `**Fix PR:** [View PR](${prUrl})` : '**Fix PR:** not generated',
            `**Total findings:** ${results.length}`,
            `**Fixed & verified:** ${results.filter(r => r.verified).length}`,
            '',
            '---',
            '',
          ]

          for (const r of results) {
            const icon = r.verified ? '✅' : r.status === 'unverified' ? '⚠️' : r.status === 'skipped' ? '⏭️' : '❌'
            const outcome = r.verified ? 'Fixed & verified'
              : r.status === 'unverified' ? 'Patched but not verified'
              : r.status === 'skipped' ? 'Skipped'
              : 'Could not patch'

            lines.push(`## ${icon} \`${r.id}\` — ${escHtml(r.title) || 'Unknown'}`)
            lines.push('')
            lines.push(`**Status:** ${outcome}`)
            if (r.patched_file) lines.push(`**File:** \`${r.patched_file}\``)
            if (r.message) lines.push(`**Note:** ${r.message}`)

            // Diff from committed changes (git show HEAD -- file)
            const patchedFile = r.patched_file
            if (patchedFile && (r.verified || r.status === 'unverified')) {
              try {
                const { execSync } = require('child_process')
                const diff = execSync(
                  `git -C target show HEAD -- "${patchedFile}"`,
                  { encoding: 'utf8', stdio: ['pipe', 'pipe', 'ignore'] }
                ).trim()
                if (diff) {
                  lines.push('')
                  lines.push('### Diff')
                  lines.push('```diff')
                  lines.push(diff.slice(0, 4000))
                  lines.push('```')
                }
              } catch {}
            }

            lines.push('')
            lines.push('---')
            lines.push('')
          }

          lines.push('> Generated by `a11y-fix` workflow. This file is an artifact — not versioned in the repository.')

          const outDir = path.join(process.env.RUNNER_TEMP, 'a11y-fix-report')
          fs.mkdirSync(outDir, { recursive: true })
          fs.writeFileSync(path.join(outDir, 'a11y-fix-report.md'), lines.join('\n'))
          console.log('Report generated at', outDir)
          NODE
        env:
          RESULTS_FILE: ${{ steps.apply_fixes.outputs.results_file }}
          PR_URL: ${{ steps.open_pr.outputs.pr_url }}

      - name: Upload fix report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-fix-report
          path: ${{ runner.temp }}/a11y-fix-report/a11y-fix-report.md
          retention-days: 90

      - name: Stop local server
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/local-server.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/local-server.pid")" || true
          fi
