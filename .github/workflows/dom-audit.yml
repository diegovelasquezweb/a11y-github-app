name: DOM Accessibility Audit

run-name: "dom-audit-${{ inputs.scan_token }}"

on:
  workflow_dispatch:
    inputs:
      scan_token:
        description: "Unique scan token"
        required: true
        type: string
      callback_url:
        description: "Callback endpoint URL"
        required: true
        type: string
      callback_token:
        description: "Callback auth token"
        required: true
        type: string
      target_owner:
        description: "Target repository owner"
        required: true
        type: string
      target_repo:
        description: "Target repository name"
        required: true
        type: string
      pull_number:
        description: "PR number"
        required: true
        type: string
      head_sha:
        description: "PR head SHA"
        required: true
        type: string
      check_run_id:
        description: "A11y DOM Audit check run ID"
        required: true
        type: string
      target_token:
        description: "Installation token for target repository"
        required: true
        type: string
      comment_id:
        description: "Unified audit comment ID to update on callback"
        required: false
        default: "0"
        type: string
      source_scan_enabled:
        description: "Whether to run the source pattern scanner"
        required: false
        default: "true"
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dom-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout runner repository
        uses: actions/checkout@v4
        with:
          path: runner

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: runner/package-lock.json

      - name: Install runner dependencies
        run: npm install
        working-directory: runner

      - name: Install Playwright browsers
        run: npx --prefix runner playwright install chromium --with-deps

      - name: Install Puppeteer Chrome (required by pa11y)
        run: node "$(find runner/node_modules -path '*/puppeteer/install.mjs' -print -quit)"

      - name: Checkout target repository at PR head
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target_owner }}/${{ inputs.target_repo }}
          ref: ${{ inputs.head_sha }}
          token: ${{ inputs.target_token }}
          path: target

      - name: Resolve local runtime config
        id: runtime
        run: |
          node <<'NODE'
          const fs = require('fs')
          const path = require('path')

          const cfgPath = path.join(process.cwd(), 'target', '.a11y-runner.json')
          const defaults = {
            workdir: 'target',
            installCommand: '',
            buildCommand: '',
            startCommand: 'python3 -m http.server 4173 --bind 127.0.0.1',
            healthUrl: 'http://127.0.0.1:4173',
            readyTimeoutMs: 120000,
          }

          let config = { ...defaults }

          if (fs.existsSync(cfgPath)) {
            const parsed = JSON.parse(fs.readFileSync(cfgPath, 'utf8'))
            config = {
              ...config,
              ...(parsed && typeof parsed === 'object' ? parsed : {}),
            }
          }

          const out = process.env.GITHUB_OUTPUT
          const lines = [
            `workdir=${String(config.workdir || defaults.workdir)}`,
            `install_command=${String(config.installCommand || '')}`,
            `build_command=${String(config.buildCommand || '')}`,
            `start_command=${String(config.startCommand || defaults.startCommand)}`,
            `health_url=${String(config.healthUrl || defaults.healthUrl)}`,
            `ready_timeout_ms=${Number(config.readyTimeoutMs || defaults.readyTimeoutMs)}`,
          ]
          fs.appendFileSync(out, `${lines.join('\n')}\n`)
          NODE

      - name: Install target dependencies
        if: ${{ steps.runtime.outputs.install_command != '' }}
        run: bash -lc "${{ steps.runtime.outputs.install_command }}"
        working-directory: ${{ steps.runtime.outputs.workdir }}

      - name: Build target project
        if: ${{ steps.runtime.outputs.build_command != '' }}
        run: bash -lc "${{ steps.runtime.outputs.build_command }}"
        working-directory: ${{ steps.runtime.outputs.workdir }}

      - name: Start local server
        run: |
          nohup bash -lc "${{ steps.runtime.outputs.start_command }}" > "$RUNNER_TEMP/local-server.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/local-server.pid"
        working-directory: ${{ steps.runtime.outputs.workdir }}

      - name: Wait for local server readiness
        run: |
          HEALTH_URL="${{ steps.runtime.outputs.health_url }}"
          TIMEOUT_MS="${{ steps.runtime.outputs.ready_timeout_ms }}"
          START=$(date +%s)
          TIMEOUT_SECONDS=$((TIMEOUT_MS / 1000))

          while true; do
            if curl -fsS "$HEALTH_URL" >/dev/null 2>&1; then
              echo "Server is ready at $HEALTH_URL"
              break
            fi

            NOW=$(date +%s)
            ELAPSED=$((NOW - START))
            if [ "$ELAPSED" -ge "$TIMEOUT_SECONDS" ]; then
              echo "Server did not become ready in ${TIMEOUT_MS}ms"
              exit 1
            fi

            sleep 2
          done

      - name: Run source pattern scanner
        id: source_scan
        if: ${{ inputs.source_scan_enabled != 'false' }}
        run: |
          set +e
          mkdir -p findings
          node runner/node_modules/@diegovelasquezweb/a11y-engine/src/source-patterns/source-scanner.mjs \
            --project-dir target \
            --output findings/a11y-pattern-findings.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run DOM audit
        id: run_audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HEALTH_URL: ${{ steps.runtime.outputs.health_url }}
        run: |
          set +e
          AUDIT_DIR="$RUNNER_TEMP/a11y-audit"
          mkdir -p "$AUDIT_DIR"

          npx --prefix runner a11y-audit \
            --base-url "$HEALTH_URL" \
            --max-routes "10" \
            --crawl-depth "3" \
            --wait-until "domcontentloaded" \
            --timeout-ms "45000" \
            --engines "axe,cdp,pa11y" \
            --with-reports \
            --output "$AUDIT_DIR/report.html"

          STATUS=$?
          echo "exit_code=$STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build callback payload
        run: |
          node <<'NODE'
          const fs = require('fs')
          const path = require('path')

          const severityRank = {
            critical: 0,
            serious: 1,
            moderate: 2,
            minor: 3,
          }

          const exitCode = Number(process.env.AUDIT_EXIT_CODE || '1')
          const payloadPath = path.join(process.cwd(), 'callback-payload.json')

          let engineAuditDir = ''
          try {
            const enginePath = fs.realpathSync(path.join(process.cwd(), 'runner', 'node_modules', '@diegovelasquezweb', 'a11y-engine'))
            engineAuditDir = path.join(enginePath, '.audit')
          } catch {
            // ignore missing engine path
          }

          const candidates = [
            engineAuditDir ? path.join(engineAuditDir, 'a11y-findings.json') : '',
            path.join(process.cwd(), 'runner', '.audit', 'a11y-findings.json'),
            path.join(process.cwd(), 'target', '.audit', 'a11y-findings.json'),
            path.join(process.cwd(), '.audit', 'a11y-findings.json'),
            path.join(process.env.RUNNER_TEMP || '', 'a11y-audit', 'a11y-findings.json'),
          ]

          let findingsFile = candidates.find(file => file && fs.existsSync(file))
          const totals = { Critical: 0, Serious: 0, Moderate: 0, Minor: 0 }
          let totalFindings = 0
          let findingsSummary = []
          let status = exitCode === 0 ? 'success' : 'failure'
          let error = exitCode === 0 ? undefined : 'DOM audit command failed'

          if (findingsFile) {
            try {
              const data = JSON.parse(fs.readFileSync(findingsFile, 'utf8'))
              const findings = Array.isArray(data.findings) ? data.findings : []
              totalFindings = findings.length
              for (const finding of findings) {
                const severity = String(finding.severity || '').toLowerCase()
                if (severity === 'critical') totals.Critical += 1
                else if (severity === 'serious') totals.Serious += 1
                else if (severity === 'moderate') totals.Moderate += 1
                else if (severity === 'minor') totals.Minor += 1
              }

              findingsSummary = findings
                .slice()
                .sort((left, right) => {
                  const leftRank = severityRank[String(left.severity || '').toLowerCase()] ?? 99
                  const rightRank = severityRank[String(right.severity || '').toLowerCase()] ?? 99
                  if (leftRank !== rightRank) return leftRank - rightRank
                  return String(left.title || '').localeCompare(String(right.title || ''))
                })
                .slice(0, 10)
                .map((finding) => ({
                  id: String(finding.id || ''),
                  title: String(finding.title || 'Untitled finding'),
                  severity: String(finding.severity || 'Unknown'),
                  wcag: finding.wcag ? String(finding.wcag) : null,
                  url: String(finding.url || ''),
                  selector: String(finding.selector || ''),
                  recommendedFix: finding.recommended_fix ? String(finding.recommended_fix) : null,
                }))
            } catch (parseError) {
              status = 'failure'
              error = `Failed to parse findings: ${parseError.message}`
            }
          } else if (status === 'success') {
            status = 'failure'
            error = 'Findings file was not generated by the audit runner'
          }

          let patternFindings = null
          const patternFindingsPath = path.join(process.cwd(), 'findings', 'a11y-pattern-findings.json')
          if (fs.existsSync(patternFindingsPath)) {
            try {
              const patternData = JSON.parse(fs.readFileSync(patternFindingsPath, 'utf8'))
              const pFindings = Array.isArray(patternData.findings) ? patternData.findings : []
              const pTotals = { Critical: 0, Serious: 0, Moderate: 0, Minor: 0 }
              for (const f of pFindings) {
                const sev = String(f.severity || '').toLowerCase()
                if (sev === 'critical') pTotals.Critical += 1
                else if (sev === 'serious') pTotals.Serious += 1
                else if (sev === 'moderate') pTotals.Moderate += 1
                else if (sev === 'minor') pTotals.Minor += 1
              }
              const pSummary = pFindings
                .slice()
                .sort((a, b) => {
                  const aRank = severityRank[String(a.severity || '').toLowerCase()] ?? 99
                  const bRank = severityRank[String(b.severity || '').toLowerCase()] ?? 99
                  return aRank !== bRank ? aRank - bRank : String(a.title || '').localeCompare(String(b.title || ''))
                })
                .slice(0, 10)
                .map(f => ({
                  id: String(f.id || ''),
                  title: String(f.title || 'Untitled finding'),
                  severity: String(f.severity || 'Unknown'),
                  file: String(f.file || ''),
                  line: f.line ? Number(f.line) : undefined,
                  patternId: String(f.pattern_id || f.patternId || ''),
                  status: String(f.status || 'confirmed'),
                }))
              patternFindings = { totalFindings: pFindings.length, totals: pTotals, findings: pSummary }
            } catch {}
          }

          const payload = {
            scan_token: process.env.SCAN_TOKEN,
            target_url: process.env.HEALTH_URL,
            target_owner: process.env.TARGET_OWNER,
            target_repo: process.env.TARGET_REPO,
            pull_number: process.env.PULL_NUMBER,
            head_sha: process.env.HEAD_SHA,
            check_run_id: process.env.CHECK_RUN_ID,
            comment_id: process.env.COMMENT_ID,
            status,
            total_findings: totalFindings,
            totals,
            findings: findingsSummary,
            ...(patternFindings ? { pattern_findings: patternFindings } : {}),
            ...(error ? { error } : {}),
          }

          fs.writeFileSync(payloadPath, JSON.stringify(payload))
          NODE
        env:
          AUDIT_EXIT_CODE: ${{ steps.run_audit.outputs.exit_code }}
          SCAN_TOKEN: ${{ inputs.scan_token }}
          TARGET_OWNER: ${{ inputs.target_owner }}
          TARGET_REPO: ${{ inputs.target_repo }}
          PULL_NUMBER: ${{ inputs.pull_number }}
          HEAD_SHA: ${{ inputs.head_sha }}
          CHECK_RUN_ID: ${{ inputs.check_run_id }}
          COMMENT_ID: ${{ inputs.comment_id }}
          HEALTH_URL: ${{ steps.runtime.outputs.health_url }}

      - name: Save findings to cache
        id: save_findings
        run: |
          mkdir -p findings
          node <<'NODE'
          const fs = require('fs')
          const path = require('path')
          let engineAuditDir = ''
          try {
            const enginePath = fs.realpathSync(path.join(process.cwd(), 'runner', 'node_modules', '@diegovelasquezweb', 'a11y-engine'))
            engineAuditDir = path.join(enginePath, '.audit')
          } catch {}
          const candidates = [
            engineAuditDir ? path.join(engineAuditDir, 'a11y-findings.json') : '',
            path.join(process.cwd(), 'runner', '.audit', 'a11y-findings.json'),
            path.join(process.cwd(), 'target', '.audit', 'a11y-findings.json'),
          ].filter(Boolean)
          const found = candidates.find(f => fs.existsSync(f))
          if (found) {
            fs.copyFileSync(found, 'findings/a11y-findings.json')
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'found=true\n')
          } else {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'found=false\n')
          }

          // Also save remediation.md if available
          const remediationCandidates = [
            engineAuditDir ? path.join(engineAuditDir, 'remediation.md') : '',
            path.join(process.cwd(), 'runner', '.audit', 'remediation.md'),
            path.join(process.cwd(), 'target', '.audit', 'remediation.md'),
          ].filter(Boolean)
          const foundRemediation = remediationCandidates.find(f => fs.existsSync(f))
          if (foundRemediation) {
            fs.copyFileSync(foundRemediation, 'findings/a11y-remediation.md')
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'remediation_found=true\n')
          }
          NODE

      - name: Cache findings
        if: ${{ steps.save_findings.outputs.found == 'true' }}
        uses: actions/cache/save@v4
        with:
          path: findings/a11y-findings.json
          key: a11y-findings-${{ inputs.head_sha }}

      - name: Cache pattern findings
        if: ${{ steps.source_scan.outputs.exit_code == '0' }}
        uses: actions/cache/save@v4
        with:
          path: findings/a11y-pattern-findings.json
          key: a11y-pattern-findings-${{ inputs.head_sha }}

      - name: Cache remediation guide
        if: ${{ steps.save_findings.outputs.remediation_found == 'true' }}
        uses: actions/cache/save@v4
        with:
          path: findings/a11y-remediation.md
          key: a11y-remediation-${{ inputs.head_sha }}

      - name: Send callback
        if: always()
        run: |
          curl -sS -X POST "${{ inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -H "x-callback-token: ${{ inputs.callback_token }}" \
            --data-binary @callback-payload.json

      - name: Stop local server
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/local-server.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/local-server.pid")" || true
          fi
